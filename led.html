<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED CataMiner@s</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

#grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px;
  justify-content: center;
  align-content: flex-start;
  max-height: 100vh;
  overflow: hidden;
}

.foto {
  position: relative;
  width: 240px;
  height: 170px;
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: 2px solid gold;
  display: block;
}

.foto .ig {
  position: absolute;
  bottom: 4px;
  left: 0;
  right: 0;
  text-align: center;
  color: gold;
  font-size: 11px;
  text-shadow: 0 0 4px black;
  background: rgba(0,0,0,0.4);
  padding: 2px 0;
}

#status {
  position: fixed;
  top: 10px;
  right: 14px;
  color: rgba(255,215,0,0.5);
  font-size: 12px;
}
</style>
</head>

<body>
<div id="status">cargando...</div>
<div id="grid"></div>

<script>
async function load() {
  try {
    const res = await fetch('/api/fotos');
    const json = await res.json();

    if (!json.ok) {
      document.getElementById('status').textContent = 'Error: ' + (json.error || '?');
      return;
    }

    const fotos = json.fotos || [];
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    fotos.forEach(p => {
      if (!p.public_url) return;

      const div = document.createElement('div');
      div.className = 'foto';

      const img = document.createElement('img');
      img.src = p.public_url;
      img.alt = p.usuario_ig || '';

      const ig = document.createElement('div');
      ig.className = 'ig';
      ig.textContent = p.usuario_ig ? '@' + p.usuario_ig : '';

      div.appendChild(img);
      div.appendChild(ig);
      grid.appendChild(div);
    });

    document.getElementById('status').textContent =
      fotos.length + ' fotos · ' + new Date().toLocaleTimeString();

  } catch (e) {
    document.getElementById('status').textContent = 'Error de red';
    console.error(e);
  }
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
