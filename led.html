<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED CataMiner@s</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: black;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: sans-serif;
}

/* ── CARROUSEL ── */
#carrousel {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
}
.slide.active { opacity: 1; }
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.slide .ig-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 60px 30px 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: gold;
  font-size: 2rem;
  font-weight: bold;
  text-shadow: 0 2px 8px black;
  letter-spacing: 1px;
}

/* ── PANTALLA CTA ── */
#cta-screen {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
  z-index: 50;
  background: #1a0a00;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#cta-screen.active { opacity: 1; }

#cta-screen .cta-bg-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#cta-screen .cta-content {
  position: relative;
  z-index: 2;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2vh;
}

#cta-screen .cta-title {
  font-family: 'Impact', 'Black Ops One', sans-serif;
  font-size: 7vw;
  color: #FFD700;
  text-shadow: 0 0 40px rgba(255,180,0,0.5), 4px 4px 0 rgba(0,0,0,0.8);
  line-height: 1.1;
  letter-spacing: 2px;
  text-transform: uppercase;
}

#cta-screen .cta-sub {
  font-family: 'Impact', sans-serif;
  font-size: 3.5vw;
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.9);
  letter-spacing: 4px;
  text-transform: uppercase;
}

#cta-screen .cta-qr-area {
  display: flex;
  align-items: center;
  gap: 3vw;
  margin-top: 1vh;
}

#cta-screen .cta-qr-box {
  background: white;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 0 60px rgba(255,215,0,0.3);
}

#cta-screen .cta-qr-box img {
  display: block;
  width: 18vw;
  height: 18vw;
  min-width: 140px;
  min-height: 140px;
}

#cta-screen .cta-arrow-text {
  font-family: 'Impact', sans-serif;
  font-size: 2.8vw;
  color: #FFD700;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.9);
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1.3;
}

/* ── LOGO arriba izquierda ── */
#logo-panel {
  position: fixed;
  top: 18px;
  left: 22px;
  z-index: 100;
}
#logo-panel img {
  height: 60px;
  display: block;
}

/* ── QR arriba derecha ── */
#qr-panel {
  position: fixed;
  top: 14px;
  right: 18px;
  background: white;
  border-radius: 12px;
  padding: 8px 8px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);

}
#qr-panel img { width: 110px; height: 110px; display: block; }
#qr-panel .qr-text {

  color: #333;
  text-align: center;

  line-height: 1.3;

/* ── Footer Tecnoincas ── */

<script>
const CTA_EVERY = 5;
const SLIDE_DURATION = 4000;
const CTA_DURATION = 8000;

let fotos = [];
let current = 0;
let slides = [];
let photoCount = 0;
let timer = null;
let ctaTimer = null;
let inCTA = false;

const carrousel = document.getElementById('carrousel');
const ctaScreen = document.getElementById('cta-screen');
const status = document.getElementById('status');

function buildSlides(data) {
  const urls = data.map(f => f.public_url).join(',');
  const prevUrls = fotos.map(f => f.public_url).join(',');
  if (urls === prevUrls) return;

  fotos = data;
  slides.forEach(s => s.remove());
  slides = [];
  if (timer) clearInterval(timer);
  if (ctaTimer) clearTimeout(ctaTimer);

  if (fotos.length === 0) return;

  fotos.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = f.public_url;
    div.appendChild(img);
    carrousel.appendChild(div);
    slides.push(div);
  });

  current = 0;
  photoCount = 0;
  scheduleNext();
}

function scheduleNext() {
  timer = setTimeout(() => {
    if (inCTA) return;
    photoCount++;
    if (photoCount > 0 && photoCount % CTA_EVERY === 0) {
      showCTA();
    } else {
      nextSlide();
      scheduleNext();
    }
  }, SLIDE_DURATION);
}

function nextSlide() {
  if (slides.length < 2) return;
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}

function showCTA() {
  inCTA = true;
  ctaScreen.classList.add('active');
  ctaTimer = setTimeout(() => {
    ctaScreen.classList.remove('active');
    inCTA = false;
    nextSlide();
    scheduleNext();
  }, CTA_DURATION);
}

async function load() {
  try {
    const res = await fetch('/api/fotos');
    const json = await res.json();
    if (!json.ok) return;
    buildSlides(json.fotos || []);
    status.textContent = (json.fotos?.length || 0) + ' fotos · ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

load();
setInterval(load, 5000);
</script>
