<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED - CataMiner@s</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

#grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
  justify-content:center;
  align-items:center;
}

img {
  width:240px;
  height:170px;
  object-fit:cover;
  border:2px solid gold;
  box-shadow:0 0 10px rgba(255,215,0,0.3);
  transition:transform 0.4s;
}

img.active {
  transform:scale(1.15);
}

#qr {
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="qr">
  <img src="/assets/qr.png" width="140" />
</div>

<script>

const supabase = window.supabase.createClient(
  "https://tczmjvcqgscpeyivpbyd.supabase.co",
  "TU_ANON_KEY_AQUI"
);

let photos = [];

async function loadPhotos() {

  const { data, error } = await supabase
    .from("fotos_mineros")
    .select("public_url")
    .order("id", { ascending: false });

  if (error) {
    console.log("ERROR SUPA:", error);
    return;
  }

  photos = data || [];

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  photos.forEach(p => {
    if (!p.public_url) return;

    const img = document.createElement("img");
    img.src = p.public_url;
    grid.appendChild(img);
  });
}

// animación tipo LED
function animate() {
  let i = 0;

  setInterval(() => {
    const imgs = document.querySelectorAll("img");
    imgs.forEach(img => img.classList.remove("active"));

    if (imgs[i]) imgs[i].classList.add("active");

    i = (i + 1) % imgs.length;
  }, 1200);
}

loadPhotos();
setInterval(loadPhotos, 5000);
setTimeout(animate, 1500);

</script>

</body>
</html>
