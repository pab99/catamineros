<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED - CataMiner@s</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

#grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
  justify-content:center;
  align-items:center;
}

img {
  width:220px;
  height:160px;
  object-fit:cover;
  border:2px solid gold;
  box-shadow:0 0 10px rgba(255,215,0,0.4);
  transition:transform 0.5s;
}

img.active {
  transform:scale(1.2);
}

#qr {
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="qr">
  <img src="/assets/qr.png" width="140" />
</div>

<script>
const supabaseUrl = "https://tczmjvcqgscpeyivpbyd.supabase.co";
const supabaseKey = "PEGÁ_ACÁ_TU_ANON_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadPhotos() {
  const { data, error } = await supabase
    .from('fotos_mineros')
    .select('public_url, created_at')
    .order('created_at', { ascending: false })
    .limit(100);

  if (error) {
    console.error("SUPABASE ERROR:", error);
    return;
  }

  console.log("LED DATA:", data);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  (data || []).forEach(p => {
    if (!p.public_url) return;

    const img = document.createElement("img");
    img.src = p.public_url;
    grid.appendChild(img);
  });
}

function animate() {
  const imgs = document.querySelectorAll("img");
  let i = 0;

  setInterval(() => {
    imgs.forEach(im => im.classList.remove("active"));
    if (imgs[i]) imgs[i].classList.add("active");
    i = (i + 1) % imgs.length;
  }, 1200);
}

loadPhotos();
setInterval(loadPhotos, 5000);
setTimeout(animate, 2000);
</script>

</body>
</html>
