<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED - CataMiner@s</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

#grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
  justify-content:center;
  align-items:center;
}

img {
  width:220px;
  height:160px;
  object-fit:cover;
  border:2px solid gold;
  box-shadow:0 0 10px rgba(255,215,0,0.4);
  transition:transform 0.5s;
}

img.active {
  transform:scale(1.2);
}

#qr {
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="qr">
  <img src="/assets/qr.jpeg" width="140" />
</div>

<script>
const SUPABASE_URL = "https://tczmjvcqgscpeyivpbyd.supabase.co";
const SUPABASE_KEY = "TU_ANON_KEY";

async function loadPhotos() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/fotos_mineros?select=public_url&order=created_at.desc",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  console.log("LED DATA:", data);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(p => {
    if (!p.public_url) return;
    const img = document.createElement("img");
    img.src = p.public_url;
    grid.appendChild(img);
  });
}

function animate() {
  const imgs = document.querySelectorAll("img");
  let i = 0;

  setInterval(() => {
    imgs.forEach(im => im.classList.remove("active"));
    if (imgs[i]) imgs[i].classList.add("active");
    i = (i + 1) % imgs.length;
  }, 1200);
}

loadPhotos();
setInterval(loadPhotos, 5000);
</script>

</body>
</html>
