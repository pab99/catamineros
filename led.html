<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED CataMiner@s</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

#grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
  justify-content:center;
}

img {
  width:240px;
  height:170px;
  object-fit:cover;
  border:2px solid gold;
}
</style>
</head>

<body>

<div id="grid"></div>

<script>

const supabaseClient = supabase.createClient(
  "https://tczmjvcqgscpeyivpbyd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjem1qdmNxZ3NjcGV5aXZwYnlkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDM0MzMxMCwiZXhwIjoyMDk1OTE5MzEwfQ.JkfuUD6RCNM2BVg6t2jgfK5dJxTGLeMarBn2UXzA_aw"
);

async function load() {

  const { data, error } = await supabaseClient
    .from("fotos_mineros")
    .select("public_url")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  (data || []).forEach(p => {
    if (!p.public_url) return;

    const img = document.createElement("img");
    img.src = p.public_url;
    grid.appendChild(img);
  });
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
