<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LED CataMiner@s</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: black;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: sans-serif;
}

/* ── CARROUSEL ── */
#carrousel {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active {
  opacity: 1;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slide .ig-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 60px 30px 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: gold;
  font-size: 2rem;
  font-weight: bold;
  text-shadow: 0 2px 8px black;
  letter-spacing: 1px;
}

/* ── QR ── */
#qr-panel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: white;
  border-radius: 16px;
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  z-index: 100;
}

#qr-panel img {
  width: 160px;
  height: 160px;
  display: block;
}

#qr-panel .qr-text {
  font-size: 11px;
  color: #333;
  text-align: center;
  font-weight: bold;
  line-height: 1.3;
}

/* ── STATUS ── */
#status {
  position: fixed;
  top: 10px;
  left: 14px;
  color: rgba(255,215,0,0.4);
  font-size: 12px;
  z-index: 100;
}

/* ── EMPTY ── */
#empty {
  display: none;
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  color: rgba(255,215,0,0.3);
  font-size: 2rem;
}
</style>
</head>

<body>

<div id="carrousel"></div>
<div id="empty">⛏️ Esperando fotos...</div>

<div id="qr-panel">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://catamineros.onrender.com/mi-foto.html" alt="QR" />
  <div class="qr-text">Escaneá y<br>encontrá tu foto</div>
</div>

<div id="status">—</div>

<script>
let fotos = [];
let current = 0;
let slides = [];
let timer = null;

const carrousel = document.getElementById('carrousel');
const empty = document.getElementById('empty');
const status = document.getElementById('status');

function buildSlides(data) {
  // Detectar si cambió la lista
  const urls = data.map(f => f.public_url).join(',');
  const prevUrls = fotos.map(f => f.public_url).join(',');
  if (urls === prevUrls) return; // sin cambios

  fotos = data;

  // Limpiar slides viejos
  slides.forEach(s => s.remove());
  slides = [];
  if (timer) clearInterval(timer);

  if (fotos.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  fotos.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');

    const img = document.createElement('img');
    img.src = f.public_url;
    img.alt = '';

    const label = document.createElement('div');
    label.className = 'ig-label';
    label.textContent = f.usuario_ig && f.usuario_ig !== 'sin_usuario'
      ? '@' + f.usuario_ig
      : '';

    div.appendChild(img);
    div.appendChild(label);
    carrousel.appendChild(div);
    slides.push(div);
  });

  current = 0;
  timer = setInterval(next, 4000);
}

function next() {
  if (slides.length < 2) return;
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}

async function load() {
  try {
    const res = await fetch('/api/fotos');
    const json = await res.json();
    if (!json.ok) return;
    buildSlides(json.fotos || []);
    status.textContent = (json.fotos?.length || 0) + ' fotos · ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
  }
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
