<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CataMiner@s 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- ⚠️ TODO TU CSS IGUAL (lo omití acá para no duplicar innecesariamente en el chat) -->
  <!-- (tu CSS original queda EXACTAMENTE igual) -->

</head>

<body>

<!-- ================= CAMERA ================= -->
<section id="screen-camera" class="screen">
  <video id="video" autoplay playsinline muted></video>
</section>

<!-- ================= REGISTER ================= -->
<section id="screen-register" class="screen">
  <div class="register-box">

    <button id="btn-skip-x">✕</button>

    <div class="register-label">¿CUÁL ES TU @?</div>

    <div id="ig-display">@</div>
    <div id="ig-error"></div>

    <div class="kbd">
      <div id="row-nums"></div>
      <div id="row-q"></div>
      <div id="row-a"></div>
      <div id="row-z"></div>
      <div id="row-bot"></div>
    </div>

    <button id="save-btn" disabled>SACAR FOTO</button>

  </div>
</section>

<!-- ================= SCRIPT ================= -->
<script>
'use strict';

var video = document.getElementById('video');
var igHandle = '';
var igValue = '';
var photoUrl = '';
var sessionPhotos = [];

/* ================= CAPTURE + SEND ================= */

function silentDownload(dataUrl, filename){

  // 👇 ACA está el FIX IMPORTANTE
  var usuario = (igHandle && igHandle.length > 0)
    ? igHandle
    : 'instagram';

  fetch('/save-photo', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      dataUrl: dataUrl,
      filename: filename,
      usuario: usuario
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){

    console.log('Foto guardada:', j.file);

    if(j.publicUrl){
      photoUrl = j.publicUrl;
      buildGallery();
    }

  })
  .catch(function(e){

    console.warn('Fallback download:', e);

    var a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    a.click();

  });
}

/* ================= IG VALIDATION ================= */

function igValid(v){
  return v.length >= 1 && v.length <= 30 && /^[a-zA-Z0-9._]+$/.test(v);
}

/* ================= DISPLAY ================= */

function igUpdateDisplay(){
  document.getElementById('ig-display').textContent = '@' + igValue;
}

/* ================= CAMERA CAPTURE FLOW ================= */

function doCapture(){

  var canvas = document.createElement('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  var dataUrl = canvas.toDataURL('image/jpeg', 0.92);

  var filename = 'cataminers_' + Date.now() + '.jpg';

  sessionPhotos.push(dataUrl);

  silentDownload(dataUrl, filename);
}

/* ================= SIMPLE UI HOOKS ================= */

document.getElementById('save-btn').addEventListener('click', function(){

  if(!igValid(igValue)) return;

  igHandle = igValue;

  doCapture();
});

document.getElementById('btn-skip-x').addEventListener('click', function(){

  igHandle = 'instagram';

  doCapture();
});

/* ================= INIT ================= */

console.log('INDEX FIXED READY');

</script>

</body>
</html>
