<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Mi Foto Minera</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

input {
  padding:12px;
  font-size:18px;
  width:260px;
}

button {
  padding:12px 18px;
  margin-left:10px;
  cursor:pointer;
}

img {
  margin-top:20px;
  max-width:90vw;
  border:3px solid gold;
}
</style>
</head>

<body>

<h1>⛏️ TU FOTO MINERA</h1>

<p>Ingresá tu Instagram</p>

<input id="ig" placeholder="@usuario" />
<button onclick="buscar()">Buscar</button>

<div id="res"></div>

<script>

const supabase = window.supabase.createClient(
  "https://tczmjvcqgscpeyivpbyd.supabase.co",
  "TU_ANON_KEY_AQUI"
);

function normalizarIg(v) {
  return (v || "")
    .replace("@","")
    .trim()
    .toLowerCase();
}

async function buscar() {

  const ig = normalizarIg(document.getElementById("ig").value);

  const { data, error } = await supabase
    .from("fotos_mineros")
    .select("public_url, usuario_ig")
    .eq("usuario_ig", ig)
    .order("id", { ascending: false });

  const res = document.getElementById("res");
  res.innerHTML = "";

  if (error) {
    res.innerHTML = "Error consultando datos";
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    res.innerHTML = "<p>No se encontró tu foto</p>";
    return;
  }

  const img = document.createElement("img");
  img.src = data[0].public_url;
  res.appendChild(img);
}

</script>

</body>
</html>
