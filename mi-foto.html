<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Mi Foto Minera</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

input, button {
  padding:12px;
  font-size:18px;
}

img {
  margin-top:20px;
  max-width:90vw;
  border:3px solid gold;
}
</style>
</head>

<body>

<h1>⛏️ TU FOTO MINERA</h1>

<input id="ig" placeholder="@usuario" />
<button onclick="buscar()">Buscar</button>

<div id="res"></div>

<script>

const supabaseClient = supabase.createClient(
  "https://tczmjvcqgscpeyivpbyd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjem1qdmNxZ3NjcGV5aXZwYnlkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDM0MzMxMCwiZXhwIjoyMDk1OTE5MzEwfQ.JkfuUD6RCNM2BVg6t2jgfK5dJxTGLeMarBn2UXzA_aw"
);

function normalizar(v) {
  return (v || "")
    .replace("@","")
    .trim()
    .toLowerCase();
}

// 👇 IMPORTANTE: función GLOBAL (window-safe)
window.buscar = async function () {

  const ig = normalizar(document.getElementById("ig").value);

  const { data, error } = await supabaseClient
    .from("fotos_mineros")
    .select("public_url, usuario_ig")
    .eq("usuario_ig", ig)
    .order("id", { ascending: false });

  const res = document.getElementById("res");
  res.innerHTML = "";

  if (error) {
    console.log(error);
    res.innerHTML = "Error Supabase";
    return;
  }

  if (!data || data.length === 0) {
    res.innerHTML = "No se encontró foto";
    return;
  }

  const img = document.createElement("img");
  img.src = data[0].public_url;
  res.appendChild(img);
};

</script>

</body>
</html>
